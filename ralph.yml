# Ralph Orchestrator Configuration
# Generated by: ralph init --backend claude
# Docs: https://github.com/mikeyobrien/ralph-orchestrator

cli:
  backend: "claude"

event_loop:
  prompt_file: "docs/Prompt.md"
  completion_promise: "LOOP_COMPLETE"
  max_iterations: 50
  max_runtime_seconds: 14400    # 4 hours max

core:
  specs_dir: ".ralph/specs/"
  guardrails:
    - "Fresh context in each iteration"
    - "Use docs/Protocol_Design.md as the source of truth for the protocol design"
    - "Write tests for the smart contract functions"
    - "Simple and readable code. Avoid unnecessary abstractions or optimizations"
    - "Less is more in code"

memories:
  enabled: true
  inject: auto
  budget: 2000

tasks:
  enabled: true
