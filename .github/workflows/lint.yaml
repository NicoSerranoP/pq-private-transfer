name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@master

      - name: Setup node env
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run hardhat node, deploy contracts (& generate contracts typescript output)
        run: |
          pnpm chain &
          CHAIN_PID=$!
          trap 'kill "$CHAIN_PID"' EXIT

          # Wait for local hardhat RPC to be ready before deploying.
          until (echo > /dev/tcp/127.0.0.1/8545) >/dev/null 2>&1; do
            sleep 1
          done

          pnpm run deploy

      - name: Run hardhat lint
        run: pnpm hardhat:lint --max-warnings=0

      - name: Run nextjs lint
        run: pnpm next:lint --max-warnings=0

      - name: Check typings on nextjs
        run: pnpm next:check-types
